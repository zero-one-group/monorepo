# https://moonrepo.dev/docs/config/project
# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
$schema: "https://moonrepo.dev/schemas/project.json"

# Phase D: this project is now a Rust crate. moon doesn't have a
# first-class rust toolchain entry, so the language is "unknown" and
# tasks shell out to cargo directly.
layer: application
language: unknown
tags: ["app", "rust"]

id: "{{ package_name | kebab_case }}"

project:
  title: "{{ package_name | kebab_case }}"
  description: "Corrected-port Rust rewrite of the Zero One Group {{ package_name | kebab_case }} service (Phase D)."

tasks:
  build:
    command: "cargo build -p {{ package_name | kebab_case }}"
    options:
      runFromWorkspaceRoot: true

  build-release:
    command: "cargo build -p {{ package_name | kebab_case }} --release"
    options:
      runFromWorkspaceRoot: true

  dev:
    command: "cargo run -p {{ package_name | kebab_case }} -- serve"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  start:
    command: "cargo run -p {{ package_name | kebab_case }} --release -- serve"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  test:
    command: "cargo test -p {{ package_name | kebab_case }}"
    options:
      runFromWorkspaceRoot: true

  smoke:
    command: "cargo test -p {{ package_name | kebab_case }} --test smoke_boot"
    options:
      runFromWorkspaceRoot: true

  lint:
    command: "cargo clippy -p {{ package_name | kebab_case }} --all-targets -- -D warnings"
    options:
      runFromWorkspaceRoot: true

  fmt-check:
    command: "cargo fmt -p {{ package_name | kebab_case }} --check"
    options:
      runFromWorkspaceRoot: true

  # Apply all pending database migrations via the in-process CLI.
  migrate:
    command: "cargo run -p {{ package_name | kebab_case }} -- migrate run"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  migrate-create:
    command: "cargo run -p {{ package_name | kebab_case }} -- migrate create"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  migrate-reset:
    command: "cargo run -p {{ package_name | kebab_case }} -- migrate reset"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  seed:
    command: "cargo run -p {{ package_name | kebab_case }} -- seed"
    options:
      runFromWorkspaceRoot: true
      envFile: "apps/{{ package_name | kebab_case }}/.env"

  generate-config:
    command: "cargo run -p {{ package_name | kebab_case }} -- generate-config"
    options:
      runFromWorkspaceRoot: true

  check-in-dance:
    command: 'echo "All is good, ready to go!"'
    deps: ["build", "migrate"]
    options:
      shell: true

  docker-build:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker build -f $projectRoot/Dockerfile . -t $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION \
      && docker image list --filter reference=$DOCKER_IMAGE\*
    options:
      mergeEnv: replace
      runFromWorkspaceRoot: true
      interactive: false
      outputStyle: stream
      runInCI: false
      cache: false
      shell: true

  docker-run:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker run --network=host --rm -it --env-file $projectRoot/.env \
        --name $DOCKER_IMAGE $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION
    options:
      mergeEnv: replace
      outputStyle: stream
      runFromWorkspaceRoot: true
      interactive: true
      runInCI: false
      cache: false
      shell: true

  docker-shell:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker run --network=host --rm -it --env-file $projectRoot/.env \
        --entrypoint sh $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION
    options:
      mergeEnv: replace
      runFromWorkspaceRoot: true
      outputStyle: stream
      interactive: true
      runInCI: false
      cache: false
      shell: true
